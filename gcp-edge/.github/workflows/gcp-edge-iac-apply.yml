name: "gcp-edge: Terraform Apply"

on:
  push:
    branches: [main]
    paths:
      - "gcp-edge/envs/prod/**"
      - "gcp-edge/modules/**"
      - "gcp-edge/.github/workflows/gcp-edge-iac-apply.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: gcp-edge-iac-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply prod
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_EDGE_PROD_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_EDGE_PROD_INFRA_SA }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Write tfvars from secret
        working-directory: gcp-edge/envs/prod
        run: printf '%s' "$TFVARS" > terraform.tfvars
        env:
          TFVARS: ${{ secrets.GCP_EDGE_PROD_TFVARS }}

      - name: Terraform init
        working-directory: gcp-edge/envs/prod
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: gcp-edge/envs/prod
        run: terraform apply -auto-approve -input=false