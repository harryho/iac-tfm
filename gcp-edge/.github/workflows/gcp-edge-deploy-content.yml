name: "gcp-edge: Deploy Content"

on:
  push:
    branches: [main]
    paths:
      - "gcp-edge/content/prod/**"

permissions:
  id-token: write
  contents: read

jobs:
  detect:
    name: Detect changed sites
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: set-matrix
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep -E '^gcp-edge/content/prod/[^/]+/' \
            | sed -E 's|^gcp-edge/content/prod/([^/]+)/.*|\1|' \
            | sort -u)
          if [ -z "$CHANGED" ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          MATRIX=$(echo "$CHANGED" | jq -R -s 'split("\n") | map(select(length > 0)) | map({site: .})')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy ${{ matrix.site }}
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (content deployer)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_EDGE_PROD_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_EDGE_PROD_CONTENT_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy ${{ matrix.site }}
        run: ./gcp-edge/scripts/deploy-site.sh --env prod ${{ matrix.site }}