name: "iac-tfm: Terraform Test"

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: iac-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - aws-edge/modules/static-site
          - aws-edge/modules/contact-form
          - aws-edge/modules/team-iam

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Terraform init
        working-directory: ${{ matrix.module }}
        run: terraform init

      - name: Terraform test
        working-directory: ${{ matrix.module }}
        run: terraform test
