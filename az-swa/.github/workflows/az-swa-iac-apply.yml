name: "az-swa: Terraform Apply"

on:
  push:
    branches: [deploy/azure]
    paths:
      - "az-swa/envs/**"
      - "az-swa/modules/**"
      - "az-swa/.github/workflows/az-swa-iac-apply.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: az-swa-iac-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZ_SWA_DEV_INFRA_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_SWA_DEV_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SWA_DEV_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Write tfvars from secret
        working-directory: az-swa/envs/dev
        run: printf '%s' "$TFVARS" > terraform.tfvars
        env:
          TFVARS: ${{ secrets.AZ_SWA_DEV_TFVARS }}

      - name: Terraform init
        working-directory: az-swa/envs/dev
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: az-swa/envs/dev
        run: terraform apply -auto-approve -input=false