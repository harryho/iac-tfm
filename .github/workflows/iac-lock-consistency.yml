name: "iac-tfm: Provider Lock Consistency"

on:
  pull_request:
    paths:
      - "**/.terraform.lock.hcl"
      - "**/variables.tf"
      - "**/main.tf"
      - ".github/workflows/iac-lock-consistency.yml"

permissions:
  contents: read

jobs:
  check-locks:
    name: Provider version consistency
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Re-init every stack and verify no lock drift
        run: |
          set -euo pipefail
          stacks=(
            "bootstrap"
            "modules/static-site"
            "modules/contact-form"
            "modules/team-iam"
            "envs/prod"
          )
          for stack in "${stacks[@]}"; do
            echo "::group::init $stack"
            (cd "$stack" && terraform init -backend=false -input=false >/dev/null)
            echo "::endgroup::"
          done

          if ! git diff --quiet -- '**/.terraform.lock.hcl'; then
            echo "::error::One or more .terraform.lock.hcl files drifted after re-init."
            git diff -- '**/.terraform.lock.hcl'
            exit 1
          fi

          echo "All lock files consistent."
