name: "iac-tfm: Terraform Plan"

on:
  pull_request:
    paths:
      - "bootstrap/**"
      - "envs/**"
      - "modules/**"
      - ".github/workflows/iac-plan.yml"
      - ".github/workflows/iac-apply.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: iac-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: Plan ${{ matrix.stack }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack:
          - dir: bootstrap
            env: bootstrap
            role_secret: AWS_ROLE_ARN_PLAN_BOOTSTRAP
            environment: ""
          - dir: envs/prod
            env: prod
            role_secret: AWS_ROLE_ARN_PLAN_PROD
            environment: production

    environment: ${{ matrix.stack.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[matrix.stack.role_secret] }}
          aws-region: ap-southeast-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Terraform fmt
        working-directory: ${{ matrix.stack.dir }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ matrix.stack.dir }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ matrix.stack.dir }}
        run: terraform validate

      - name: Create tfvars from secret
        if: env.TFVARS_SECRET != ''
        working-directory: ${{ matrix.stack.dir }}
        run: printf '%s' "$TFVARS_CONTENT" > terraform.tfvars
        env:
          TFVARS_SECRET: ${{ secrets[format('TFVARS_%s', matrix.stack.env)] }}
          TFVARS_CONTENT: ${{ secrets[format('TFVARS_%s', matrix.stack.env)] }}
